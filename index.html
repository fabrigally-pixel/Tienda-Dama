<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÚRSULA - Tienda Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --accent: #c5a059; /* Dorado elegante del oso */
            --bg: #fcfbf7;     /* Crema muy suave */
            --text: #333; 
            --green: #25d366; 
        }
        
        body { font-family: 'Playfair Display', serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        header { background: white; padding: 40px 20px; text-align: center; border-bottom: 1px solid #f0e4d7; }
        
        /* Logo OSO */
        .logo-bear { 
            width: 120px; 
            height: auto;
            display: block; 
            margin: 0 auto 15px auto; 
            filter: drop-shadow(0 4px 6px rgba(197, 160, 89, 0.2));
        }

        /* Título ÚRSULA */
        header h1 { 
            margin: 0; 
            color: var(--accent); 
            letter-spacing: 8px; 
            font-size: 3em; 
            font-family: 'Cinzel', serif; 
            font-weight: 600;
            text-transform: uppercase;
        }
        
        header p { 
            font-style: italic; 
            color: #999; 
            margin-top: 10px; 
            font-size: 1.1em;
            letter-spacing: 1px;
        }
        
        /* Barra de Categorías */
        .category-bar { display: flex; gap: 12px; overflow-x: auto; padding: 20px; background: white; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid #f5f5f5; scrollbar-width: none; justify-content: flex-start; }
        .cat-btn { padding: 10px 25px; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 50px; white-space: nowrap; cursor: pointer; font-family: 'Cinzel', serif; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .cat-btn:hover, .cat-btn.active { background: var(--accent); color: white; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3); }

        /* Contenedor */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        /* Tarjeta de Producto */
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #f2ece4; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.06); }
        
        .img-container { width: 100%; height: 400px; background: #fff; position: relative; overflow: hidden; cursor: zoom-in; }
        .main-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .product-card:hover .main-img { transform: scale(1.03); }
        
        .mini-gal { display: flex; gap: 8px; padding: 15px; background: #fff; overflow-x: auto; border-bottom: 1px solid #f9f9f9; }
        .mini-gal img { width: 55px; height: 55px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid #eee; opacity: 0.7; transition: 0.3s; }
        .mini-gal img:hover { opacity: 1; border-color: var(--accent); }

        .info { padding: 25px; flex-grow: 1; display:flex; flex-direction:column; justify-content:space-between; }
        .price { font-size: 26px; font-weight: 600; color: var(--accent); font-family: 'Cinzel', serif; margin-bottom: 5px; }
        h3 { margin: 0 0 15px 0; font-size: 1.2em; text-transform: uppercase; color: #333; font-family: 'Cinzel', serif; letter-spacing: 1px; line-height: 1.4; }
        
        .talles-info-box { background: #fffbf2; border-left: 3px solid var(--accent); padding: 12px; font-size: 13px; margin: 15px 0; border-radius: 4px; color: #777; white-space: pre-line; font-style: italic; }

        .selector-group { margin-bottom: 20px; }
        label { font-size: 11px; font-weight: bold; color: #aaa; text-transform: uppercase; display: block; margin-top: 10px; font-family: sans-serif; letter-spacing: 1px;}
        select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #eee; background: #fafafa; font-family: 'Playfair Display', serif; font-size: 15px; color: #555; outline: none; }
        
        .btn-add { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 10px; font-family: 'Cinzel', serif; letter-spacing: 2px; transition: 0.3s; font-size: 14px; }
        .btn-add:hover { background: #b08d48; box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3); }
        
        /* Carrito */
        .cart-float { position: fixed; bottom: 30px; right: 30px; background: var(--green); color: white; padding: 18px 35px; border-radius: 50px; cursor: pointer; display: none; z-index: 100; font-weight: bold; border: none; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3); font-family: sans-serif; font-size: 16px; transition: transform 0.2s; }
        .cart-float:hover { transform: scale(1.05); }
        
        /* Modales */
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 200; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border: 1px solid #eee; }

        #zoom-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.98); z-index: 1000; justify-content:center; align-items:center; cursor: zoom-out; }
        #zoom-overlay img { max-width: 90%; max-height: 90%; object-fit: contain; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<header>
    <img src="https://hnnixqelbkuyfplnncci.supabase.co/storage/v1/object/public/imagenes/IMG-20260227-WA0059.jpg" class="logo-bear" alt="Logo Úrsula">
    
    <h1>ÚRSULA</h1>
    <p>Indumentaria & Estilo</p>
</header>

<div class="category-bar" id="category-bar"></div>

<div class="container" id="catalogo">
    <p style="text-align: center; grid-column: 1/-1; padding: 40px; color: #999; font-style: italic;">Preparando la colección...</p>
</div>

<button class="cart-float" id="cart-float" onclick="abrirModal()">
    🛍️ Mi Pedido (<span id="cart-count">0</span>)
</button>

<div id="zoom-overlay" onclick="this.style.display='none'">
    <img id="img-zoom-target" src="">
</div>

<div class="modal" id="modal-cliente">
    <div class="modal-content">
        <h2 style="color:var(--accent); margin-top:0; text-align:center; font-family: 'Cinzel', serif; border-bottom: 2px solid #f9f9f9; padding-bottom: 20px;">Tu Selección</h2>
        
        <div id="resumen-carrito" style="margin-bottom:25px; max-height: 300px; overflow-y: auto;"></div>
        
        <label style="margin-top:0">Tu Nombre Completo:</label>
        <input type="text" id="nombre-cliente" placeholder="Ej: María Perez" style="width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; box-sizing: border-box; font-family: 'Playfair Display', serif; font-size: 16px;">
        
        <button onclick="finalizarPedido()" style="background:var(--green); color:white; border:none; padding:18px; border-radius:8px; width:100%; font-weight:bold; cursor:pointer; font-family: sans-serif; font-size: 16px; letter-spacing: 1px;">ENVIAR PEDIDO POR WHATSAPP</button>
        <button onclick="cerrarModal()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer; width:100%; font-size:14px; text-decoration: underline;">Seguir mirando</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://hnnixqelbkuyfplnncci.supabase.co";
    const SUPABASE_KEY = "sb_publishable_zjD9Q4lUlodn7XtRwF0W_A_LttLpWGa";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const WHATSAPP_NUMERO = "5493775461122";
    
    let productosAll = [];
    let carrito = [];
    const categoriasMenu = ["Todo", "Camisas", "Pantalones", "Remeras & Tops", "Sweaters & Buzos", "Blazers & Camperas", "Shorts & Polleras", "Monos & Vestidos", "Blusas"];

    async function cargarProductos() {
        const { data, error } = await supabaseClient.from('productos').select('*').order('created_at', {ascending: false});
        if(error) return;
        productosAll = data || [];
        
        const bar = document.getElementById('category-bar');
        bar.innerHTML = categoriasMenu.map(c => `<button class="cat-btn ${c==='Todo'?'active':''}" onclick="filtrar('${c}', this)">${c}</button>`).join('');
        
        renderizar(productosAll);
    }

    function filtrar(cat, el) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        const filtered = (cat === 'Todo') ? productosAll : productosAll.filter(p => p.marca === cat);
        renderizar(filtered);
    }

    function abrirZoom(url) {
        document.getElementById('img-zoom-target').src = url;
        document.getElementById('zoom-overlay').style.display = 'flex';
    }

    function cambiarImagen(idProd, nuevaUrl) {
        const img = document.getElementById(`main-img-${idProd}`);
        img.src = nuevaUrl;
        img.parentElement.onclick = () => abrirZoom(nuevaUrl);
    }

    function renderizar(lista) {
        const contenedor = document.getElementById('catalogo');
        if(lista.length === 0) { contenedor.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#999; font-style:italic;">No hay prendas disponibles en esta categoría.</p>'; return; }
        
        contenedor.innerHTML = lista.map(p => {
            const fotosExtra = p.fotos_extra ? p.fotos_extra.split(',').map(f => f.trim()).filter(f => f !== "") : [];
            const todasLasFotos = [p.imagen_url, ...fotosExtra];

            return `
            <div class="product-card">
                <div class="img-container" onclick="abrirZoom('${p.imagen_url}')">
                    <img src="${p.imagen_url}" class="main-img" id="main-img-${p.id}">
                </div>
                
                ${todasLasFotos.length > 1 ? `
                <div class="mini-gal">
                    ${todasLasFotos.map(foto => `<img src="${foto}" onclick="event.stopPropagation(); cambiarImagen('${p.id}', '${foto}')">`).join('')}
                </div>` : ''}

                <div class="info">
                    <div>
                        <h3>${p.nombre}</h3>
                        <div class="price">${p.categoria}</div>
                        ${p.tabla_talles ? `<div class="talles-info-box">${p.tabla_talles}</div>` : ''}
                    </div>

                    <div>
                        <div class="selector-group">
                            <label>Talle:</label>
                            <select id="talle-${p.id}">
                                ${p.descripcion ? p.descripcion.split(',').map(t => `<option>${t.trim()}</option>`).join('') : '<option>Único</option>'}
                            </select>
                            <label>Color:</label>
                            <select id="color-${p.id}">
                                ${p.marca_detalle ? p.marca_detalle.split(',').map(c => `<option>${c.trim()}</option>`).join('') : '<option>Único</option>'}
                            </select>
                        </div>
                        <button class="btn-add" onclick="agregarAlCarrito(event, '${p.id}', '${p.nombre}', '${p.categoria}', '${p.imagen_url}')">AGREGAR AL PEDIDO</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function agregarAlCarrito(event, id, nombre, precioVenta, foto) {
        const talle = document.getElementById(`talle-${id}`).value;
        const color = document.getElementById(`color-${id}`).value;
        carrito.push({ nombre, precioVenta, talle, color, foto });
        
        document.getElementById('cart-float').style.display = 'block';
        document.getElementById('cart-count').innerText = carrito.length;
        
        // Animación de botón
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "¡AGREGADO!";
        btn.style.background = "#25d366";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "var(--accent)";
        }, 1500);
    }

    function abrirModal() {
        const resumen = document.getElementById('resumen-carrito');
        if(carrito.length === 0) {
            resumen.innerHTML = "<p style='text-align:center; color:#999'>Tu pedido está vacío.</p>";
        } else {
            resumen.innerHTML = carrito.map((i, index) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center; border-bottom:1px solid #f5f5f5; padding-bottom:10px;">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <img src="${i.foto}" style="width:60px; height:60px; object-fit:cover; border-radius:6px; border:1px solid #eee;">
                        <div style="line-height:1.4">
                            <b style="font-family:'Cinzel', serif; font-size:14px; color:#333;">${i.nombre}</b><br>
                            <small style="color:#777;">${i.talle} / ${i.color}</small>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <b style="color:var(--accent); font-size:15px;">${i.precioVenta}</b><br>
                        <small style="color:#ff6b6b; cursor:pointer; font-size:11px; font-weight:bold; text-transform:uppercase;" onclick="eliminarDelCarrito(${index})">Eliminar</small>
                    </div>
                </div>`).join('');
        }
        document.getElementById('modal-cliente').style.display = 'flex';
    }

    function eliminarDelCarrito(index) {
        carrito.splice(index, 1);
        document.getElementById('cart-count').innerText = carrito.length;
        if(carrito.length === 0) document.getElementById('cart-float').style.display = 'none';
        abrirModal();
    }

    function cerrarModal() { document.getElementById('modal-cliente').style.display = 'none'; }

    async function finalizarPedido() {
        const cliente = document.getElementById('nombre-cliente').value;
        if (!cliente) return alert("Por favor, escribí tu nombre para saber de quién es el pedido.");
        if (carrito.length === 0) return alert("El carrito está vacío.");

        let textoWhatsApp = `¡Hola Úrsula! Soy *${cliente}* y me encantaría encargar estas prendas:\n\n`;
        let linksFotos = carrito.map(i => i.foto).join(',');

        carrito.forEach((item, idx) => {
            textoWhatsApp += `▫️ *${item.nombre}*\n   Talle: ${item.talle} | Color: ${item.color}\n   Precio: ${item.precioVenta}\n\n`;
        });
        
        textoWhatsApp += `Total de prendas: ${carrito.length}`;

        const { error } = await supabaseClient.from('pedidos').insert([{ 
            cliente, 
            detalles: textoWhatsApp, 
            total: carrito.length + " items", 
            estado: "NUEVO",
            fotos_pedido: linksFotos 
        }]);

        if(!error) {
            window.open(`https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(textoWhatsApp)}`, '_blank');
            carrito = [];
            location.reload();
        } else {
            alert("Hubo un error al enviar el pedido. Por favor intentá de nuevo.");
        }
    }
    cargarProductos();
</script>
</body>
</html>
